name: Build PixelCat Caddy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build linux-${{ matrix.arch }}
    runs-on: ubuntu-latest
    env:
      CADDY_VERSION: v2.11.2
      XCADDY_VERSION: v0.4.5
      CADDY_FORWARDPROXY_REF: naive
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Install xcaddy
        run: go install "github.com/caddyserver/xcaddy/cmd/xcaddy@${XCADDY_VERSION}"

      - name: Build Caddy
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          "$(go env GOPATH)/bin/xcaddy" build \
            "${CADDY_VERSION}" \
            --output pixelcat-naiveproxy-caddy \
            --with "github.com/caddyserver/forwardproxy=github.com/klzgrad/forwardproxy@${CADDY_FORWARDPROXY_REF}"

      - name: Package
        run: |
          asset="pixelcat-naiveproxy-caddy-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$asset" pixelcat-naiveproxy-caddy
          sha256sum "$asset" > "$asset.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelcat-naiveproxy-caddy-linux-${{ matrix.arch }}
          path: |
            pixelcat-naiveproxy-caddy-linux-${{ matrix.arch }}.tar.gz
            pixelcat-naiveproxy-caddy-linux-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload release assets
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pixelcat-naiveproxy-caddy-linux-${{ matrix.arch }}.tar.gz
            pixelcat-naiveproxy-caddy-linux-${{ matrix.arch }}.tar.gz.sha256
